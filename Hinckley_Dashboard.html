.btn-blue{background:#1D4ED8;color:#fff;border-color:#1D4ED8}

.btn-pdf{background:#FFF1F2;color:#DC2626;border-color:#FECDD3}

.btn-xls{background:#F0FDF4;color:#16A34A;border-color:#BBF7D0}
.btn-xls:hover{background:#DCFCE7}
.btn-active{background:#0F172A;color:#fff;border-color:#0F172A}
select.sel{height:32px;padding:0 10px;border-radius:8px;border:1.5px solid #E2E8F0;background:#fff;color:#374151}
.toggle{display:flex;border:1.5px solid #E2E8F0;border-radius:10px;overflow:hidden}
.toggle button{border:none;border-radius:0;height:32px;padding:0 18px;background:#fff;color:#64748B;font-weight:700}
.toggle button.on{background:#0F172A;color:#fff}
.stats-label{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:20px}
.stat-card{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:8px;padding:10px 12px;cursor:pointer;text-align:center}
.stat-card:hover{filter:brightness(.97)}
.stat-n{font-size:22px;font-weight:700}
.stat-l{font-size:10px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group{border:1.5px solid #E2E8F0;border-radius:10px;overflow:hidden;margin-bottom:12px}
.group-hdr{width:100%;display:flex;align-items:center;gap:10px;padding:11px 16px;border:none;text-align:left;cursor:pointer;font-family:inherit}
.group-hdr:hover{filter:brightness(.97)}
.group-name{font-size:14px;font-weight:700;flex:1}
.group-count{font-size:10px;font-weight:600;color:#94A3B8}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.task-row{width:100%;display:flex;align-items:center;gap:10px;padding:10px 16px;border:none;border-bottom:1px solid #E5E7EB;background:#fff;text-align:left;cursor:pointer;font-family:inherit}
.task-row:hover{background:#F8FAFC}
.task-row.open{background:#EFF6FF}
.task-text{font-size:12px;flex:1;line-height:1.4;color:#0F172A;text-align:left}
.task-date{font-size:10px;color:#94A3B8;flex-shrink:0;min-width:44px;text-align:right}
.pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;flex-shrink:0;white-space:nowrap}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.edit-form{background:#F9FAFB;border-top:1px solid #E5E7EB;padding:14px 16px}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field label{font-size:10px;font-weight:700;color:#6B7280;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{width:100%;padding:6px 8px;font-size:11px;border:1px solid #D1D5DB;border-radius:6px;background:#fff;color:#111;font-family:inherit}
.field textarea{height:72px;resize:vertical}
.form-btns{display:flex;gap:8px;align-items:center}
.btn-save{height:28px;padding:0 16px;font-size:11px;font-weight:700;background:#1D4ED8;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-cancel{height:28px;padding:0 14px;font-size:11px;background:#fff;color:#6B7280;border:1px solid #D1D5DB;border-radius:6px;cursor:pointer}
.btn-arch{background:none;border:none;color:#DC2626;font-size:11px;cursor:pointer;margin-right:auto;font-weight:600}
.arch-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #E5E7EB;border-radius:8px;margin-bottom:4px;opacity:.55}
.empty{color:#9CA3AF;padding:20px 0;text-align:center;font-size:12px}
/* Process hub */
.hub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.wf-card{border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .1s}
.wf-card:hover{transform:translateY(-2px)}
.wf-banner{padding:24px 20px 20px;border:none;width:100%;text-align:left;cursor:pointer;font-family:inherit}
.wf-icon{font-size:28px;margin-bottom:10px;display:block}
.wf-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-.3px}
.wf-counts{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}

.wf-progress-track{height:6px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}
.wf-progress-fill{height:6px;background:#fff;border-radius:99px}
.wf-phase{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);margin-top:8px;text-transform:uppercase;letter-spacing:.07em}
.wf-body{background:#fff;border:2px solid transparent;border-top:none;border-radius:0 0 14px 14px;padding:16px}
.wf-section-title{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:14px}
.wf-section-title:first-child{margin-top:0}
.step-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F8FAFC}
.step-label{font-size:11px;flex:1}
.todo-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F8FAFC}
.todo-label{font-size:11px;flex:1;color:#0F172A}
.doc-item{font-size:10px;color:#3B82F6;padding:2px 0}
.wf-owners{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
@media print{.topbar-right{display:none}}

</head>

<div id="screen-meetings" style="display:none;max-width:900px"></div>

<div id="screen-hub" style="display:none">

</div>

</div>

</div>

function loadData() {
  try { const d = JSON.parse(localStorage.getItem(SK)||"null"); if(d){tasks=d.tasks;nid=d.nid;} else seed(); } catch(e){seed();}
  try { archived = JSON.parse(localStorage.getItem(DK)||"[]"); } catch(e){ archived=[]; }
}
function saveData() {
  localStorage.setItem(SK, JSON.stringify({tasks,nid}));
  localStorage.setItem(DK, JSON.stringify(archived));
}
function seed() {
  tasks = SEED.map((s,i)=>({id:i+1,task:s[0],status:s[1],date:s[2],person:s[3],category:s[4],priority:"",notes:""}));
  nid = tasks.length + 1;
}

function ac(n){ return AVC[n]||["#F3F4F6","#374151"]; }
function ini(n){ return (n||"?").split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase(); }
function fd(d){ if(!d)return""; try{ const[,m,dy]=d.split("-"); return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]+" "+parseInt(dy); }catch(e){return"";} }
function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function avHTML(name,size){
  const[bg,fg]=ac(name);
  return `<span class="av" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*.42)}px;background:${bg};color:${fg}">${ini(name)}</span>`;
}
function statusPill(s){
  const bg=STATUS_BG[s]||"#F1F5F9", col=STATUS_COL[s]||"#64748B", dot=STATUS_DOT[s]||"#CBD5E1";
  return `<span class="pill" style="background:${bg};color:${col};display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:${dot};display:inline-block"></span>${esc(s)}</span>`;
}
function catPill(c){
  const col=CAT_COLOR[c]||"#64748B";
  return `<span class="pill" style="background:${col}22;color:${col}">${esc(c)}</span>`;
}
function people(){ return [...new Set(tasks.map(t=>t.person).filter(Boolean))].sort(); }
function visible(){
  return tasks.filter(t=>
    (!filterStatus||t.status===filterStatus)&&
    (!filterPrimary||(groupBy==="person"?t.person===filterPrimary:t.category===filterPrimary))&&
    (!filterSecondary||(groupBy==="person"?t.category===filterSecondary:t.person===filterSecondary))
  );
}

// ── SCREEN SWITCHING ──────────────────────────────────────────────────────
function setScreen(s){
  screen=s;
  document.getElementById("screen-tasks").style.display    = s==="tasks"?"":"none";
  document.getElementById("screen-hub").style.display      = s==="hub"?"":"none";
  document.getElementById("screen-meetings").style.display = s==="meetings"?"":"none";
  document.getElementById("btn-tasks").className    = s==="tasks"?"on":"";
  document.getElementById("btn-hub").className      = s==="hub"?"on":"";
  document.getElementById("btn-meetings").className = s==="meetings"?"on":"";
  if(s==="hub")      renderHub();
  if(s==="meetings") renderMeetings();
}
function setGroup(g){
  groupBy=g;filterSecondary="";filterPrimary="";openTaskId=null;
  document.getElementById("grp-person").className = g==="person"?"on":"";
  document.getElementById("grp-cat").className    = g==="category"?"on":"";
  render();
}
function toggleArchive(){
  showArchive=!showArchive;
  document.getElementById("btn-archive").className = showArchive?"btn btn-active":"btn";
  document.getElementById("btn-archive").textContent = showArchive?"◀ Back":"Archive ("+archived.length+")";
  render();
}

function toggleAllGroups(){
  const allBodies = document.querySelectorAll('[id^="group-body-"]');
  if(!allBodies.length) return;
  const anyVisible = Array.from(allBodies).some(el => el.style.display !== "none");
  allBodies.forEach(el => {
    const key = el.id.replace("group-body-","");
    collapsed[key] = anyVisible;
    el.style.display = anyVisible ? "none" : "";
    const arrow = el.previousElementSibling?.querySelector('span:last-child');
    if(arrow) arrow.textContent = anyVisible ? "▶" : "▼";
  });
  const btn = document.getElementById("btn-collapse");
  if(btn) btn.textContent = anyVisible ? "⊞ Expand all" : "⊟ Collapse all";
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  renderSecondaryFilter();
  renderStats();
  renderContent();
}

function renderSecondaryFilter(){
  const sel = document.getElementById("filter-secondary");
  const cur = filterSecondary;
  if(groupBy==="person"){
    sel.innerHTML = `<option value="">All workflows</option>`+CATEGORIES.map(c=>`<option${c===cur?" selected":""}>${c}</option>`).join("");
  } else {
    sel.innerHTML = `<option value="">All people</option>`+people().map(p=>`<option${p===cur?" selected":""}>${p}</option>`).join("");
  }
  document.getElementById("stats-label").textContent = "Tasks per "+(groupBy==="person"?"assignee":"workflow");
}

function renderStats(){
  const vis = visible();
  const groups = groupBy==="person"
    ? people().map(p=>({label:p,count:vis.filter(t=>t.person===p).length})).filter(x=>x.count>0)
    : CATEGORIES.map(c=>({label:c,count:vis.filter(t=>t.category===c).length})).filter(x=>x.count>0);

  let html = groups.map(({label,count})=>{
    const color = groupBy==="person" ? ac(label)[1] : (CAT_COLOR[label]||"#64748B");
    const bg    = groupBy==="person" ? ac(label)[0] : (CAT_BG[label]||"#F8FAFC");
    const active = filterPrimary===label;
    return `<div class="stat-card" style="background:${bg};border-color:${active?color:color+"30"}" onclick="statClick('${label.replace(/'/,"\'")}')">
      <div class="stat-n" style="color:${color}">${count}</div>
      <div class="stat-l" style="color:${color}">${esc(label)}</div>
    </div>`;
  }).join("");
  html += `<div class="stat-card"><div class="stat-n">${vis.length}</div><div class="stat-l" style="color:#94A3B8">Total</div></div>`;
  document.getElementById("stats-row").innerHTML = html;
}

function statClick(label){
  filterPrimary = filterPrimary===label ? "" : label;
  renderSecondaryFilter();
  renderStats();
  renderContent();
}

function renderContent(){
  if(showArchive){ renderArchive(); return; }
  const addTop = document.getElementById("add-form-top");
  addTop.innerHTML = addingNew ? buildEditForm(null) : "";
  if(addingNew){ attachFormEvents("new-form"); }

  const vis = visible();
  const groupKeys = groupBy==="person" ? people() : CATEGORIES;
  let html = "";
  groupKeys.forEach(key=>{
    const gTasks = vis.filter(t=>groupBy==="person"?t.person===key:t.category===key);
    if(!gTasks.length) return;
    const ip=gTasks.filter(t=>t.status==="In Progress").length;
    const dn=gTasks.filter(t=>t.status==="Done").length;
    const ns=gTasks.filter(t=>t.status==="Not Started").length;
    const bg   = groupBy==="person" ? ac(key)[0] : (CAT_BG[key]||"#F8FAFC");
    const col  = groupBy==="person" ? ac(key)[1] : (CAT_COLOR[key]||"#374151");
    const bdr  = col+"50";
    html += `<div class="group" style="border-color:${bdr}">
      <button class="group-hdr" style="background:${bg}" onclick="toggleGroup('${key.replace(/'/,"\'")}')">
        ${groupBy==="person" ? avHTML(key,26) : `<span class="dot" style="background:${CAT_COLOR[key]||col}"></span>`}
        <span class="group-name" style="color:${groupBy==="person"?"#0F172A":col}">${esc(key)}</span>
        <span class="group-count">${gTasks.length} tasks</span>
        ${ip>0?`<span class="badge" style="background:#EFF6FF;color:#1D4ED8">${ip} active</span>`:""}
        ${dn>0?`<span class="badge" style="background:#F0FDF4;color:#16A34A">${dn} done</span>`:""}
        ${ns>0?`<span class="badge" style="background:#F1F5F9;color:#64748B">${ns} pending</span>`:""}
        <span style="font-size:10px;color:#CBD5E1;margin-left:4px">${collapsed[key]?"▶":"▼"}</span>
      </button>
      <div id="group-body-${CSS.escape(key)}" style="display:${collapsed[key]?"none":""}">`;
    gTasks.forEach((t,i)=>{
      const isOpen = openTaskId===t.id;
      const isChecked = bulkSelected.has(t.id);
      html += `<div style="display:flex;align-items:stretch;border-bottom:1px solid #E5E7EB;background:${isChecked?"#EFF6FF":"transparent"}">
        <label style="display:flex;align-items:center;padding:0 6px 0 12px;cursor:pointer;flex-shrink:0" onclick="event.stopPropagation()">
          <input type="checkbox" ${isChecked?"checked":""} onchange="toggleBulkSelect(${t.id},this.checked)" style="width:14px;height:14px;cursor:pointer;accent-color:#1D4ED8">
        </label>
        <button class="task-row${isOpen?" open":""}" style="opacity:${t.status==="Done"?.45:1};flex:1;border:none;border-bottom:none;padding:10px 10px 10px 4px" onclick="toggleTask(${t.id})">
          <span onclick="event.stopPropagation();cycleStatus(${t.id})" title="Click to cycle status" style="width:11px;height:11px;border-radius:50%;flex-shrink:0;background:${STATUS_DOT[t.status]||"#CBD5E1"};cursor:pointer;display:inline-block"></span>
          <span class="task-text">${esc(t.task)}</span>
          <span class="task-date">${fd(t.date)}</span>
          ${statusPill(t.status)}
          ${groupBy==="person" ? catPill(t.category) : avHTML(t.person,20)+`<span style="font-size:11px;color:#64748B;min-width:80px;text-align:left">${esc(t.person)}</span>`}
          ${t.priority?`<span class="pill" style="background:${PRI_BG[t.priority]};color:${PRI_COL[t.priority]}">${t.priority}</span>`:`<span style="font-size:9px;color:#E2E8F0">set priority</span>`}
          <span style="font-size:10px;color:#CBD5E1">${isOpen?"▲":"▼"}</span>
        </button>
      </div>`;
      if(isOpen){
        html += `<div class="edit-form" id="form-${t.id}">${buildEditForm(t)}</div>`;
      }
    });
    html += `</div></div>`;
  });
  if(!html){
    document.getElementById("main-content").innerHTML = `<div class="empty">No tasks match current filters.</div>`;
    return;
  }
  const vis2 = visible();
  const groupKeys2 = groupBy==="person"
    ? [...new Set(vis2.map(t=>t.person).filter(Boolean))].sort()
    : CATEGORIES.filter(c=>vis2.some(t=>t.category===c));
  const collapseBtn = `<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button id="btn-collapse" onclick="toggleAllGroups()" style="height:26px;padding:0 12px;font-size:11px;font-weight:600;background:white;color:#475569;border:1px solid #D1D5DB;border-radius:6px;cursor:pointer">
      ⊟ Collapse all
    </button>
  </div>`;
  document.getElementById("main-content").innerHTML = collapseBtn + html;
  // attach form events for open task
  if(openTaskId){ attachFormEvents("form-"+openTaskId); }
}

function renderArchive(){
  document.getElementById("add-form-top").innerHTML="";
  if(!archived.length){ document.getElementById("main-content").innerHTML=`<div class="empty">No archived tasks.</div>`; return; }
  let html = `<div style="font-size:13px;font-weight:700;margin-bottom:12px;color:#6B7280">Archived (${archived.length})</div>`;
  archived.forEach(t=>{
    html += `<div class="arch-row">
      ${avHTML(t.person,20)}
      <span style="font-size:11px;color:#6B7280;min-width:80px">${esc(t.person)}</span>
      <span style="font-size:11px;flex:1;color:#6B7280">${esc(t.task)}</span>
      ${statusPill(t.status)}
      ${catPill(t.category)}
      <button class="btn" style="height:24px;font-size:10px;opacity:1" onclick="restoreTask(${t.id})">Restore</button>
    </div>`;
  });
  document.getElementById("main-content").innerHTML = html;
}

function toggleBulkSelect(id, checked){
  if(checked) bulkSelected.add(id);
  else bulkSelected.delete(id);
  updateBulkBar();
  // update just this row's checkbox without full re-render
}

function updateBulkBar(){
  const bar=document.getElementById("bulk-bar");
  const count=document.getElementById("bulk-count");
  if(!bar) return;
  if(bulkSelected.size>0){
    bar.style.display="flex";
    count.textContent=bulkSelected.size+" task"+(bulkSelected.size>1?"s":"")+" selected";
    // populate person select
    const ps=document.getElementById("bulk-person");
    if(ps){
      const ppl=[...new Set(tasks.map(t=>t.person).filter(Boolean))].sort();
      ps.innerHTML='<option value="">Reassign to...</option>'+ppl.map(p=>`<option>${p}</option>`).join("");
    }
  } else {
    bar.style.display="none";
  }
}

function clearBulk(){
  bulkSelected.clear();
  updateBulkBar();
  renderContent();
}

function applyBulkChange(field, value){
  if(!value) return;
  const toArchive=[];
  bulkSelected.forEach(id=>{
    const idx=tasks.findIndex(t=>t.id===id);
    if(idx>=0){
      tasks[idx]={...tasks[idx],[field]:value};
      if(field==="status"&&value==="Done") toArchive.push(tasks[idx]);
    }
  });
  toArchive.forEach(t=>{archived.push(t);tasks=tasks.filter(x=>x.id!==t.id);});
  saveData();
  bulkSelected.clear();
  updateBulkBar();
  render();
}

function bulkArchive(){
  if(!confirm("Archive "+bulkSelected.size+" task(s)?")) return;
  bulkSelected.forEach(id=>{
    const t=tasks.find(x=>x.id===id);
    if(t){archived.push(t);}
  });
  tasks=tasks.filter(t=>!bulkSelected.has(t.id));
  bulkSelected.clear();
  saveData();
  updateBulkBar();
  render();
}

function cycleStatus(id){
  const idx=tasks.findIndex(t=>t.id===id);
  if(idx<0) return;
  const cycle=["Not Started","In Progress","Done"];
  const cur=tasks[idx].status;
  const next=cycle[(cycle.indexOf(cur)+1)%cycle.length];
  if(next==="Done"){
    archived.push({...tasks[idx],status:"Done"});
    tasks.splice(idx,1);
  } else {
    tasks[idx]={...tasks[idx],status:next};
  }
  saveData();
  renderContent();
}

function toggleGroup(key){
  collapsed[key] = !collapsed[key];
  const el = document.getElementById("group-body-"+CSS.escape(key));
  if(el) el.style.display = collapsed[key] ? "none" : "";
  // Update arrow on header button
  const hdr = el?.previousElementSibling;
  if(hdr){
    const arrow = hdr.querySelector('span:last-child');
    if(arrow) arrow.textContent = collapsed[key] ? "▶" : "▼";
  }
}
function toggleTask(id){
  openTaskId = openTaskId===id ? null : id;
  renderContent();
}

// ── FORM ──────────────────────────────────────────────────────────────────
function buildEditForm(t){
  const id = t ? "form-"+t.id : "new-form";
  const pOpts = people().map(p=>`<option${t&&t.person===p?" selected":""}>${p}</option>`).join("");
  const cOpts = CATEGORIES.map(c=>`<option${t&&t.category===c?" selected":""}>${c}</option>`).join("");
  return `<div id="${id}">
    <div class="edit-grid">
      <div class="field"><label>Task</label><textarea id="${id}-task">${t?esc(t.task):""}</textarea></div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <div class="field"><label>Assignee</label><select id="${id}-person"><option value="">— select —</option>${pOpts}</select></div>
        <div class="field"><label>Workflow</label><select id="${id}-cat">${cOpts}</select></div>
        <div class="field"><label>Status</label><select id="${id}-status">
          <option${!t||t.status==="Not Started"?" selected":""}>Not Started</option>
          <option${t&&t.status==="In Progress"?" selected":""}>In Progress</option>
          <option${t&&t.status==="Done"?" selected":""}>Done</option>
        </select></div>
        <div class="field"><label>Priority — set by you</label><select id="${id}-pri">
          <option value=""${!t||!t.priority?" selected":""}>— not set —</option>
          <option${t&&t.priority==="High"?" selected":""}>High</option>
          <option${t&&t.priority==="Medium"?" selected":""}>Medium</option>
          <option${t&&t.priority==="Low"?" selected":""}>Low</option>
        </select></div>
      </div>
    </div>
    <div class="form-btns">
      ${t?`<button class="btn-arch" onclick="archiveTask(${t.id})">Archive task</button>`:`<span style="flex:1"></span>`}
      <button class="btn-cancel" onclick="cancelForm(${t?t.id:"null"})">Cancel</button>
      <button class="btn-save" onclick="saveTask(${t?t.id:"null"},'${id}')">Save</button>
    </div>
  </div>`;
}

function attachFormEvents(id){
  // nothing needed — using inline onclick
}

function openAdd(){
  addingNew=true;
  openTaskId=null;
  renderContent();
  document.getElementById("new-form-task")?.focus();
}

function cancelForm(id){
  if(id===null||id==="null"){ addingNew=false; }
  else { openTaskId=null; }
  renderContent();
}

function saveTask(id, formId){
  const task = document.getElementById(formId+"-task")?.value?.trim();
  if(!task) return;
  const obj = {
    task,
    person: document.getElementById(formId+"-person")?.value||"Unassigned",
    category: document.getElementById(formId+"-cat")?.value||CATEGORIES[0],
    status: document.getElementById(formId+"-status")?.value||"Not Started",
    priority: document.getElementById(formId+"-pri")?.value||"",
    notes: "",
    date: ""
  };
  if(id===null||id==="null"){
    tasks.push({...obj,id:nid++});
    addingNew=false;
  } else {
    const idx=tasks.findIndex(t=>t.id===id);
    if(idx>=0) tasks[idx]={...tasks[idx],...obj};
    openTaskId=null;
  }
  saveData();
  render();
}

function archiveTask(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  archived.push(t);
  tasks=tasks.filter(x=>x.id!==id);
  openTaskId=null;
  saveData();
  render();
  document.getElementById("btn-archive").textContent="Archive ("+archived.length+")";
}

function restoreTask(id){
  const t=archived.find(x=>x.id===id);
  if(!t)return;
  tasks.push(t);
  archived=archived.filter(x=>x.id!==id);
  saveData();
  render();
  document.getElementById("btn-archive").textContent="Archive ("+archived.length+")";
}

const CHEAT_SHEETS = {}

function printCheatSheet(){
  const COLORS = {vicai:"#B45309",molo:"#16793A",purchasing:"#1D4ED8",paylocity:"#7C3AED",financial:"#0D9488",sysconfig:"#475569"};
  let body = `<h1 style="font-family:Arial;font-size:28px;color:#0F172A;margin-bottom:4px">CLIENT NAME</h1>
    <div style="font-family:Arial;font-size:14px;color:#64748B;margin-bottom:4px">Process Cheat Sheet — Dos &amp; Don&#x27;ts</div>
    <div style="font-family:Arial;font-size:11px;color:#94A3B8;font-style:italic;border-bottom:2px solid #E2E8F0;padding-bottom:12px;margin-bottom:24px">NetSuite · MOLO · Vic.AI · Paylocity Implementation | Generated ${new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>`;

  WORKFLOWS.forEach((w,i)=>{
    const cs = CHEAT_SHEETS[w.id];
    if(!cs) return;
    const color = COLORS[w.id]||"#374151";
    body += `<div style="page-break-before:${i>0?"always":"auto"};padding-top:${i>0?"20px":"0"}">
      <h2 style="font-family:Arial;font-size:20px;font-weight:800;color:${color};border-bottom:3px solid ${color};padding-bottom:6px;margin-bottom:16px">${esc(w.name)}</h2>
      <h3 style="font-family:Arial;font-size:13px;font-weight:700;color:#16A34A;margin-bottom:8px">✅ DO</h3>
      <ul style="font-family:Arial;font-size:12px;color:#0F172A;line-height:1.6;margin:0 0 20px;padding-left:20px">
        ${cs.dos.map(d=>`<li style="margin-bottom:4px">${esc(d)}</li>`).join("")}
      </ul>
      <h3 style="font-family:Arial;font-size:13px;font-weight:700;color:#DC2626;margin-bottom:8px">🚫 DON'T</h3>
      <ul style="font-family:Arial;font-size:12px;color:#0F172A;line-height:1.6;margin:0 0 20px;padding-left:20px">
        ${cs.donts.map(d=>`<li style="margin-bottom:4px">${esc(d)}</li>`).join("")}
      </ul>
    </div>`;
  });

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Hinckley Cheat Sheet</title>
    <style>@media print{@page{margin:1.5cm;size:A4} body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style>
  </head><body style="max-width:800px;margin:0 auto;padding:32px">${body}</body></html>`;

  const blob = new Blob([html],{type:"text/html;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "Hinckley_Cheat_Sheet.html";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toggleWf(id){
  openWf = openWf===id ? null : id;
  openStep = null;
  hubEditId = null;
  renderHub();
}

function toggleHubBulk(id, checked, e){
  e.stopPropagation();
  if(checked) hubBulkSelected.add(id);
  else hubBulkSelected.delete(id);
  renderHub();
}

function applyHubBulkStatus(status, e){
  e.stopPropagation();
  if(!status) return;
  const toArchive=[];
  hubBulkSelected.forEach(id=>{
    const idx=tasks.findIndex(t=>t.id===id);
    if(idx>=0){
      tasks[idx]={...tasks[idx],status};
      if(status==="Done") toArchive.push(tasks[idx]);
    }
  });
  toArchive.forEach(t=>{archived.push(t);tasks=tasks.filter(x=>x.id!==t.id);});
  hubBulkSelected.clear();
  saveData();
  renderHub();
  if(screen==="tasks") render();
}

function clearHubBulk(e){
  e.stopPropagation();
  hubBulkSelected.clear();
  renderHub();
}

function toggleHubEdit(id, e){
  e.stopPropagation();
  hubEditId = hubEditId===id ? null : id;
  openStep = null;
  renderHub();
}

          <label style="font-size:10px;font-weight:700;color:#6B7280;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Priority — set by you</label>
          <select id="${fid}-pri" style="width:100%;height:27px;padding:0 7px;font-size:11px;border:1px solid #D1D5DB;border-radius:6px;background:#fff;color:#111;font-family:inherit">
            <option value=""${!t.priority?" selected":""}>— not set —</option>
            <option${t.priority==="High"?" selected":""}>High</option>

      <button onclick="hubEditId=null;renderHub()" style="height:26px;padding:0 12px;font-size:11px;background:#fff;color:#6B7280;border:1px solid #D1D5DB;border-radius:6px;cursor:pointer;font-family:inherit">Cancel</button>
      <button onclick="saveHubTask(${t.id},'${fid}')" style="height:26px;padding:0 14px;font-size:11px;font-weight:700;background:#1D4ED8;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit">Save</button>
    </div>

function saveHubTask(id, fid){
  const task = document.getElementById(fid+"-task")?.value?.trim();
  if(!task) return;
  const idx = tasks.findIndex(t=>t.id===id);
  if(idx<0) return;
  tasks[idx] = {
    ...tasks[idx],
    task,
    person: document.getElementById(fid+"-person")?.value || tasks[idx].person,
    status: document.getElementById(fid+"-status")?.value || tasks[idx].status,
    priority: document.getElementById(fid+"-pri")?.value || "",
  };
  hubEditId = null;
  saveData();
  renderHub();
  // Also refresh task list if visible
  if(screen==="tasks") render();
}

function hubArchiveTask(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  archived.push(t);
  tasks = tasks.filter(x=>x.id!==id);
  hubEditId = null;
  saveData();
  renderHub();
  if(screen==="tasks") render();
}

function toggleStep(key, e){
  e.stopPropagation();
  openStep = openStep===key ? null : key;
  renderHub();
}

function exportPDF(){
  const date = new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const ps = [...new Set(tasks.map(t=>t.person).filter(Boolean))].sort();
  let rows = "";
  ps.forEach(person=>{
    const pt = tasks.filter(t=>t.person===person);
    if(!pt.length) return;
    rows += `<tr><td colspan="5" style="background:#F8FAFC;padding:10px 12px;font-weight:700;font-size:13px;border-bottom:2px solid #E2E8F0;color:#0F172A">${person} <span style="font-weight:400;font-size:11px;color:#94A3B8">${pt.length} tasks</span></td></tr>`;
    pt.forEach(t=>{
      const sc = STATUS_COL[t.status]||"#64748B";
      const cc = CAT_COLOR[t.category]||"#64748B";
      const ds = t.date ? new Date(t.date+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "—";
      rows += `<tr style="border-bottom:1px solid #F1F5F9">
        <td style="padding:8px 12px;font-size:11px;color:#0F172A">${t.task}</td>
        <td style="padding:8px 12px"><span style="background:${sc}18;color:${sc};padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap">${t.status}</span></td>
        <td style="padding:8px 12px"><span style="background:${cc}18;color:${cc};padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap">${t.category}</span></td>
        <td style="padding:8px 12px;font-size:10px;font-weight:${t.priority?700:400};color:${t.priority==="High"?"#991B1B":t.priority==="Medium"?"#92400E":t.priority==="Low"?"#166534":"#CBD5E1"}">${t.priority||"—"}</td>
        <td style="padding:8px 12px;font-size:10px;color:#94A3B8;white-space:nowrap">${ds}</td>
      </tr>`;
    });
  });

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Hinckley Task Report</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;color:#0F172A;padding:32px;font-size:12px}
    h1{font-size:22px;font-weight:700;margin-bottom:4px}
    .sub{font-size:12px;color:#94A3B8;margin-bottom:24px}
    .stats{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
    .stat{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:10px 18px}
    .stat-n{font-size:24px;font-weight:700}
    .stat-l{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;border-bottom:2px solid #E2E8F0}
    @media print{@page{margin:1.5cm;size:A4} body{padding:0}}
  </style></head><body>
  <h1>CLIENT NAME — Task Report</h1>
  <div class="sub">Generated ${date} &middot; ${tasks.length} tasks &middot; ${archived.length} archived</div>
  <div class="stats">
    <div class="stat"><div class="stat-n">${tasks.length}</div><div class="stat-l">Total tasks</div></div>
    <div class="stat"><div class="stat-n">${tasks.filter(t=>t.status==="Not Started").length}</div><div class="stat-l">Not started</div></div>
    <div class="stat"><div class="stat-n">${tasks.filter(t=>t.status==="In Progress").length}</div><div class="stat-l">In progress</div></div>
    <div class="stat"><div class="stat-n">${tasks.filter(t=>t.status==="Done").length}</div><div class="stat-l">Done</div></div>

  <table><thead><tr><th>Task</th><th>Status</th><th>Workflow</th><th>Priority</th><th>Date</th></tr></thead>
  <tbody>${rows}</tbody></table>
  </body></html>`;

  // Download as HTML file — user opens it and prints to PDF
  const blob = new Blob([html], {type:"text/html;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "Hinckley_Report_"+new Date().toISOString().slice(0,10)+".html";

function exportExcel(){
  const esc2 = v => `"${(v||"").toString().replace(/"/g,'""')}"`;
  const headers = ["Task","Assignee","Workflow","Status","Priority","Date","Notes"];
  const rows = tasks.map(t=>[esc2(t.task),esc2(t.person),esc2(t.category),esc2(t.status),esc2(t.priority),esc2(t.date),esc2(t.notes)].join(","));
  const archRows = archived.map(t=>[esc2(t.task),esc2(t.person),esc2(t.category),esc2("ARCHIVED - "+t.status),esc2(t.priority),esc2(t.date),esc2(t.notes)].join(","));
  const csv = [headers.join(","), ...rows, "", "--- ARCHIVED ---", ...archRows].join("\n");
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "Hinckley_Tasks_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
